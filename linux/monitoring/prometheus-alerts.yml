groups:
  - name: linux-infrastructure
    interval: 30s
    rules:

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.instance }}"
          description: "CPU usage {{ $value | printf \"%.1f\" }}% for 5+ minutes"

      - alert: CriticalCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL CPU on {{ $labels.instance }}"
          description: "CPU {{ $value | printf \"%.1f\" }}% — immediate action required"

      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint!~"/boot.*"} / node_filesystem_size_bytes) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk on {{ $labels.instance }}:{{ $labels.mountpoint }}"
          description: "{{ $value | printf \"%.1f\" }}% free — check and extend LV"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory on {{ $labels.instance }}"
          description: "Memory {{ $value | printf \"%.1f\" }}% used"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} is DOWN"
          description: "Prometheus cannot scrape {{ $labels.job }}"

      - alert: HighLoadAverage
        expr: node_load1 > (count without(cpu, mode)(node_cpu_seconds_total{mode="idle"})) * 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High load average on {{ $labels.instance }}"
          description: "Load {{ $value }} — more than 2× CPU count"
